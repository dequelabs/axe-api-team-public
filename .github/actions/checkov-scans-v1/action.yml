name: checkov-scans
description: Temporarily a no-op while a replacement for Prisma Cloud is set up. Inputs are kept for interface compatibility but unused.

inputs:
  prisma-access-key:
    description: Prisma Cloud access key
    required: true
  prisma-secret-key:
    description: Prisma Cloud secret key
    required: true
  prisma-api-url:
    description: Prisma Cloud API URL
    required: true
  frameworks:
    description: Comma-separated list of frameworks to scan
    required: false
    default: sca_package,github_actions,dockerfile,secrets

runs:
  using: 'composite'
  steps:
    - name: Skip checkov scan
      shell: bash
      run: echo "checkov-scans-v1 is temporarily a no-op while a replacement for Prisma Cloud is set up."
