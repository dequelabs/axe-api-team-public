name: checkov-scans
description: Checkov scans cloud infrastructure configurations to find misconfigurations before they're deployed and sends a result to Prisma Cloud.

inputs:
  prisma-access-key:
    description: Prisma Cloud access key
    required: true
  prisma-secret-key:
    description: Prisma Cloud secret key
    required: true
  prisma-api-url:
    description: Prisma Cloud API URL
    required: true
  frameworks:
    description: Comma-separated list of frameworks to scan
    required: false
    default: sca_package,github_actions,dockerfile,secrets

runs:
  using: 'composite'
  steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so follow-up steps can access it
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    # Checkov's sca_package scanner doesn't support pnpm-lock.yaml, so convert it
    - name: Convert pnpm-lock.yaml to package-lock.json
      id: convert-pnpm-lock
      if: hashFiles('pnpm-lock.yaml') != '' && hashFiles('package-lock.json') == ''
      shell: bash
      run: node $GITHUB_ACTION_PATH/dist/index.js pnpm-lock.yaml
    # The checkov scan
    - name: Run Prisma Cloud
      id: prisma-cloud
      uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # tag=v12.3075.0
      with:
        api-key: ${{ inputs.prisma-access-key }}::${{ inputs.prisma-secret-key }}
        # CLI output to the console and md file
        output_format: cli
        framework: ${{ inputs.frameworks }}
        soft_fail_on: LOW
      env:
        PRISMA_API_URL: ${{ inputs.prisma-api-url }}
    # Clean up the generated package-lock.json so it doesn't affect later steps
    - name: Remove generated package-lock.json
      if: steps.convert-pnpm-lock.outcome == 'success'
      shell: bash
      run: rm -f package-lock.json
